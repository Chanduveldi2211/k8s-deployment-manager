spring:
  application:
    name: k8s-deployment-manager

server:
  port: 8086

kubernetes:
  config-path: ${KUBE_CONFIG_PATH:~/.kube/config}
  default-namespace: default
  api-timeout-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.pcveldi: DEBUG
    io.fabric8.kubernetes: INFO
